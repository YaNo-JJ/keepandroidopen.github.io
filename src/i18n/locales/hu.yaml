# [en] social_callout_x_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects every Android device worldwide. Learn more: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_1: "2026 szeptemberétől a Google blokkolni fog minden Android-alkalmazást, amelynek fejlesztője nem regisztrált és nem adott meg hatósági személyazonosítót. Ez minden Android-eszközt érint világszerte. Tudj meg többet: {url}"
# [en] social_callout_x_2: "Google announced that all Android app developers must register centrally, pay a fee, and submit government ID, or their apps will be blocked on every device. over 67 organizations oppose this. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_2: "A Google bejelentette, hogy minden Android-fejlesztőnek regisztrálnia kell, díjat kell fizetnie és személyazonosítót kell benyújtania, különben az alkalmazásai blokkolódnak. Több mint 67 szervezet tiltakozik. {url}"
# [en] social_callout_x_3: "Android's openness distinguished it from iPhone for 17 years. Google is now requiring mandatory developer registration for all apps, including those distributed outside the Play Store. {url} #KeepAndroidOpen"
social_callout_x_3: "Az Android nyitottsága különböztette meg az iPhone-tól. A Google most kötelező fejlesztői regisztrációt ír elő minden alkalmazásra. {url} #KeepAndroidOpen"
# [en] social_callout_x_4: "F-Droid, the open-source Android app store, calls Google's developer verification an \"existential threat\" to alternative app distribution. The EFF warns it creates a pathway to censorship. {url} #KeepAndroidOpen"
social_callout_x_4: "Az F-Droid „létfontosságú fenyegetésnek” nevezi a Google fejlesztőellenőrzését az alternatív alkalmazás-terjesztésre nézve. {url}"
# [en] social_callout_x_5: "Google's proposed workaround for installing unverified apps requires 9 steps, a 24-hour wait, and runs through Play Services, which Google can modify at any time. It hasn't shipped in any beta. {url} #KeepAndroidOpen"
social_callout_x_5: "A nem ellenőrzött alkalmazások telepítése: 9 lépés, 24 órás várakozás, és egy bármikor módosítható rendszer. {url}"
# [en] social_callout_linkedin_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification before their software can be installed on any device. This applies to all apps, not just those on the Play Store. over 67 organizations have signed an open letter opposing the policy. {url} #KeepAndroidOpen"
social_callout_linkedin_1: "2026 szeptemberétől a Google minden Android-fejlesztőtől regisztrációt és személyazonosítást követel. Ez minden eszközt érint világszerte."
# [en] social_callout_linkedin_2: "Android's openness has been its distinguishing feature for nearly two decades. Google is now mandating developer registration for all Android apps, including those distributed through alternative stores like F-Droid. The EFF, FSF, Tor Project, and dozens of other organizations are raising serious concerns. {url} #KeepAndroidOpen"
social_callout_linkedin_2: "Az Android nyitottsága volt a fő különbség. A Google most kötelező regisztrációt vezet be."
# [en] social_callout_linkedin_3: "Google's developer verification program would give a single company the technical ability to block any app, from any developer, on any certified Android device worldwide. This affects independent developers, open-source projects, and the principle that you control the software on hardware you own. {url} #KeepAndroidOpen"
social_callout_linkedin_3: "Egyetlen cég technikailag blokkolhat bármilyen alkalmazást bármely eszközön."
# [en] social_callout_linkedin_4: "F-Droid estimates 85% of its open-source apps could face distribution issues under Google's new developer verification rules. The requirement for government ID and signing keys creates barriers for anonymous contributors, developers in sanctioned countries, and volunteer-maintained projects. {url} #KeepAndroidOpen"
social_callout_linkedin_4: "Az F-Droid alkalmazásainak nagy része problémákba ütközhet az új szabályok miatt."
# [en] social_callout_linkedin_5: "Google's proposed \"advanced flow\" for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and runs entirely through Google Play Services. The community has been asked to accept a blog post as a functional safeguard. It has not appeared in any beta release. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "A „haladó folyamat” 9 lépést és 24 órás várakozást igényel."
# [en] social_callout_bluesky_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects all apps, not just Play Store apps. F-Droid calls it an \"existential threat.\" @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
