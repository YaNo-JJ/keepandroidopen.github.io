# [en] act_survey: "**Tell Google what you think of this** through their own [developer verification survey](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(for all the good that will do)</small>."
act_survey: >-
  **Бұл туралы не ойлайтыныңызды Google-ге айтыңыз** — олардың өз [әзірлеушілерді тексеру сауалнамасы](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) арқылы <small>(қанша пайдасы болса да)</small>.
