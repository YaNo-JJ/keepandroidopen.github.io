act_google_text: >-
  अगर आप इस प्रोग्राम के तकनीकी कार्यान्वयन (technical implementation) या इसके आंतरिक तर्क (internal rationale) के बारे में कुछ जानते हैं,
  तो कृपया कार्यस्थल के कंप्यूटर और Gmail अकाउंट के बजाय किसी *अन्य निजी साधन* से हमें
  [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) पर संपर्क करें।
  आपकी गोपनीयता की पूर्ण गारंटी है।
