# [en] act_dev_heading: "Developers"
act_dev_heading: "डेवेलपर्स"
# [en] act_dev_intro: "<strong style=\"text-transform: uppercase;\">Do not sign up.</strong> Don't join the program by signing up for the Android Developer Console and agreeing to their irrevocable Terms and Conditions. Don't verify your identity. *Don't play ball.*"
act_dev_intro: >-
  <strong style="text-transform: uppercase;">sign up न करें।</strong>
  Android Developer Console के लिए उनके प्रोग्राम को join करने के लिए sign up न करें
  और ऐसी नियमों एवं शर्तों को न मानें जिन्हें वापस नहीं लिया जा सकता।
  अपनी पहचान का सत्यापन न करें। *उनकी दाल मत गलने दो।*
# [en] act_dev_resist: "Google's plan only works if developers comply. Don't."
act_dev_resist: "गूगल का प्लान सिर्फ डेवेलपर्स की सहमति से ही काम कर सकता है। सहमति देने की भूल न करें।"
# [en] act_dev_talk: "Talk other developers and organizations out of signing up."
act_dev_talk: "वे डेवेलपर्स और संस्थान जो sign up कर रहे हैं या करना चाहते हैं उन्हें रोकें।"
# [en] act_dev_warn: "Add the [FreeDroidWarn library](https://github.com/woheller69/FreeDroidWarn) to your apps to warn users."
act_dev_warn: >-
  इस [FreeDroidWarn library](https://github.com/woheller69/FreeDroidWarn)
  को अपने users को सावधान करने के लिए अपने ऐप्प में जोड़ें।
# [en] act_dev_banner: "Run a website? [Add the countdown banner.](/banner)"
act_dev_banner: 'अगर आप एक वेबसाइट चलाते हैं तो इस [countdown banner](/banner) को अवश्य जोड़ें।'
