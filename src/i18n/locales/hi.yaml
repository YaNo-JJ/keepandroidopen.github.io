# [en] what_heading: "What Google is doing"
what_heading: "गूगल क्या कर रहा है?"
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Google** before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through [F-Droid](https://f-droid.org), built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software."
what_intro: >-
  अगस्त 2025 में, गूगल ने एंड्राइड पर डेवेलप करने के लिए नई आवश्यकताओं की
  [घोषणा की](https://developer.android.com/developer-verification)
  जिसके अनुसार: सितम्बर 2026 के शुरू होते ही, **हर एंड्राइड ऐप्प डेवलपर को केंद्रीय रूप से गूगल के साथ पंजीकृत होना होगा**
  इससे पहले कि उनके द्वारा बनाये गए सॉफ्टवेयर किसी भी डिवाइस पर इनस्टॉल हो सकें। सिर्फ प्लेस्टोर वाले ही ऐप्प्स नहीं, सभी ऐप्प्स।
  इसमें साथी-सहपाठियों के बीच शेयर किये गए ऐप्प्स भी आते हैं, और
  [F-Droid](https://f-droid.org)
  जैसे प्लेटफार्म भी, जो शौक़ीन तथा तकनीक प्रेमियों द्वारा निजी उपयोग के लिए बनाया गया है।
  गूगल के इस कदम से स्वतंत्र डेवेलपर्स, मंदिर-मस्जिद-गुरुद्वारे जैसी धार्मिक संस्थाएं और सामुदायिक समूह,
  और तकनीक-प्रेमी, ये सभी अपना सॉफ्टवेयर बनाने और वितरित करने के अधिकार से वंचित हो जाएंगे।
# [en] what_registration: "Registration requires:"
what_registration: "पंजीकरण करने के लिए आपको नीचे दिए गए कदम अपनाने होंगे:-"
# [en] what_req_fee: "Paying a fee to Google"
what_req_fee: "गूगल को एक तय शुल्क भुगतान करना"
# [en] what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_terms: "गूगल की नियम और शर्तों से सहमत होना"
# [en] what_req_id: "Surrendering your government-issued identification"
what_req_id: "सरकारी पहचान पत्र सौंपना (सर्वाधिक महत्त्वपूर्ण एवं चिंताजनक)"
# [en] what_req_signing: "Providing evidence of your private signing key"
what_req_signing: "सबूत के तौर पर अपनी private signing key दिखाना"
# [en] what_req_appids: "Listing all current and all future application identifiers"
what_req_appids: "सभी वर्तमान तथा भविष्य के application identifiers को सूचीबद्ध करना"
# [en] what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: "यदि कोई डेवलपर इन शर्तों का पालन नहीं करता है, तो उनके ऐप्प्स पूरी दुनिया में शांतिपूर्ण ढंग से हर एंड्राइड डिवाइस पर ब्लॉक कर दिए जाएंगे।"
# [en] impact_heading: "Who this hurts"
impact_heading: "यह किसे नुक्सान पहुंचा रहा है"
# [en] impact_you_heading: "You"
impact_you_heading: "आपको"
# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "आपने एक एंड्राइड डिवाइस खरीदा क्यूंकि गूगल कहता है उनका डिवाइस एक खुला प्लेटफार्म है। आप उस डिवाइस पर वो इनस्टॉल कर सकते थे जो आपको पसंद है, यही शर्त थी।"
# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *you* paid for."
impact_you_p2: >-
  गूगल अब उस शर्त को नए सिरे से लिख रहा है, उस हार्डवेयर पर भी जो आप पहले से खरीद चुके हैं।
  इस अपडेट के बाद, आप सिर्फ वही ऐप्प्स चला सकेंगे जो गूगल द्वारा प्रमाणित हैं।
  आपके फ़ोन पर: *आपकी* संपत्ति, जिसके लिए *आपने* पैसे दिए हैं।
# [en] impact_dev_heading: "Independent developers"
impact_dev_heading: "स्वतंत्र डेवेलपर्स को"
# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: "एक किशोर लड़के का पहला ऐप्प, एक वॉलंटियर का प्राइवेसी टूल, या एक कंपनी का गोपनीय बीटा। गूगल के आशीर्वाद के बिना सितम्बर 2026 के बाद आप उनमें से किसी भी प्रकार के ऐप्प इनस्टॉल नहीं कर पाएंगे।"
# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow calls it [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_dev_p2: >-
  [F-Droid](https://f-droid.org), जो कि हज़ारों free और open-source ऐप्प्स का घर है,
  उन्होंने इसे एंड्राइड के ["अस्तित्व पर खतरा"](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html) बताया है।
  Cory Doctorow ने इसे ["Darth Android"](https://pluralistic.net/2025/09/01/fulu/) कहा है।
# [en] impact_gov_heading: "Governments & civil society"
impact_gov_heading: "सरकारें एवं सामाजिक संगठन"
# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation."
impact_gov_p1: >-
  गूगल का एक [साबित इतिहास](https://www.aclu.org/news/free-speech/app-store-oligopoly) है,
  जब तानाशाही सरकारें ऐप हटाने की मांग करती हैं तो गूगल मान लेता है।
  इस प्रोग्राम के साथ, आपके देश की संस्थाओं को चलाने वाला सॉफ्टवेयर एक ऐसी विदेशी कंपनी की मर्ज़ी पर निर्भर होगा जिसे कोई जवाबदेह नहीं ठहरा सकता।
# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: >-
  [EFF ने](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship)
  app gatekeeping को "इंटरनेट सेंसरशिप की तरफ एक अग्रसर होता हुआ रास्ता" बताया है।
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: 'गूगल का "escape hatch" एक जाल है।'
# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: >-
  गूगल कहता है कि "power users" अभी भी
  ["unverified apps इनस्टॉल कर सकते हैं।"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html)
  पर *असल में* यह कुछ ऐसा दिखता है:
# [en] flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "System Settings में जाओ, फिर Developer Options ढूंढो।"
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "build number को **सात बार** टैप करें ताकि Developer Mode चालू हो सके।"
# [en] flow_step3: "Dismiss scare screens about coercion"
flow_step3: "आपके साथ जबरदस्ती नहीं की जा रही है, इसकी पुष्टि करें।"
# [en] flow_step4: "Enter your PIN"
flow_step4: "PIN या कोई भी पासवर्ड मांगने पर डालें।"
# [en] flow_step5: "Restart the device"
flow_step5: "अपने डिवाइस को Restart करें।"
# [en] flow_step6: "**Wait 24 hours**"
flow_step6: "**24 घंटे का इंतज़ार करें**"
# [en] flow_step7: "Come back, dismiss more scare screens"
flow_step7: "वापस आएं, फिर और डरावनी screens पर पुष्टि करें कि आप अपने होश में हैं।"
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: '"allow temporarily" (7 दिन) या "allow indefinitely" दोनों में से किसी एक विकल्प का चयन करें।'
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: 'फिर से कन्फर्म करें कि आप "जोखिमों" को समझते हैं।'
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: >-
  नौ चरण। 24-घंटे का अनिवार्य cooling-off समय। *एक ऐप्प को अपने डिवाइस पर इनस्टॉल करने के लिए।*
# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups."
flow_detail: >-
  इससे भी बुरी बात: यह flow पूरी तरह से **Google Play Services** के द्वारा कार्यरत रहेगा, न कि Android OS द्वारा।
  गूगल इसे बदल सकता है, इसे कठिन बना सकता है, या फिर किसी भी समय इस flow को खत्म कर सकता है,
  इसके लिए न OS Updates की जरुरत है और न ही आपकी अनुमति की।
  और अब तक उन्होंने न beta, न preview, और न ही कोई canary build शिप किया है।
  यह flow सिर्फ एक blog post और कुछ mockups के रूप में है, इसे एक कागज़ी कार्यवाही भी बोल सकते हैं।
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "यह सिर्फ Android तक ही सीमित नहीं है"
# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: "अगर गूगल उन अरबों डिवाइसों को लॉक कर सकता है जो खुले प्लेटफार्म के रूप में बेचे गए थे, तो दुनिया का हर हार्डवेयर निर्माता यह देख रहा है।"
# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at least you could always install competing software. In hardware, it is a *fait accompli* that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist."
precedent_p1: >-
  सन्देश यह जा रहा है कि: **वो कंपनी जिसने आपके डिवाइस को बनाया है, आपके खरीदने के बाद तय करेगी कि आप उस पर क्या चला सकते हैं।**
  सॉफ्टवेयर की भाषा में इसे "rug pull" या फिर हिंदी में "पैरों तले जमीन खिसकना" बोलते हैं;
  फिर भी सॉफ्टवेयर में आप कोई विकल्प इनस्टॉल कर सकते हो। पर हार्डवेयर के नज़रिये से देखें तो,
  यह एक *fait accompli* है या "अब पछताए होत क्या, जब चिड़िया चुग गई खेत",
  एक ऐसी स्थिति जो आपकी स्वतंत्रता छीन लेती है और आपको एक जवाबदेही से बचने वाले gatekeeper
  और दोषी एकाधिकारी (monopolist) की मनमर्ज़ी के आगे बेबस कर देती है।
# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices *already* in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it."
precedent_p2: >-
  Android का खुलापन सिर्फ एक फीचर नहीं था। यह एक *वादा* भी था जिसके चलते यह iPhone से अलग था।
  करोड़ों ने Android सिर्फ इसी वजह से चुना। गूगल अब उस वादे को एकतरफा रूप से तोड़ रहा है,
  उन डिवाइसों पर भी जो *पहले से* लोगों की जेब में हैं, क्योंकि उन्होंने तय कर लिया है कि
  उनके पास इतना बाज़ार वर्चस्व और सरकारी पकड़ है कि वे इससे बच निकलेंगे।
# [en] precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle Android's open legacy.\"*"
precedent_arstechnica: >-
  [Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/):
  *"गूगल का एप्पल के प्रति द्वेष, एंड्राइड की खुली विरासत को तबाह करने पर उतारू है।"*
# [en] objections_heading: "But wait, isn't this..."
objections_heading: "परन्तु, यह..."
# [en] obj_security_q: "\"...just about security?\""
obj_security_q: '"...सुरक्षा वाली बात है न?"'
# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* identifiable and controllable. Malware authors can register. Indie developers and dissidents often can't. The [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) is blunt: identity-based gatekeeping is a censorship tool, not a security one."
obj_security_a: >-
  सुरक्षा वाली वजह बस "आँखों में धूल झोंकने" वाली बात है। वैसे भी Google Play Protect डेवलपर की पहचान से अलग malware को स्कैन करता है।
  Govt. ID की आवश्यकता से कोड सुरक्षित नहीं हो जाता, इससे *डेवेलपर्स* को पहचानने और नियंत्रित करने में आसानी होती है।
  Malware वाले डेवेलपर्स पंजीकरण कर सकते हैं। स्वतंत्र डेवेलपर्स और आलोचक अक्सर नहीं कर सकते।
  [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship)
  साफ़-साफ़ कहता है: पहचान-आधारित gatekeeping एक सेंसरशिप का हथियार है, इसका सुरक्षा से कोई नाता नहीं है।
# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: '"...advanced flow के उपयोग से तो sideloading फिर भी मुमकिन है न?"'
# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** built to ensure almost nobody completes it. And since it runs through Play Services rather than the OS, Google can tighten or kill it silently."
obj_sideloading_a: >-
  नौ चरण, 24-hour का इंतज़ार, Developer Options में दफनाया गया, एक proprietary service के द्वारा चलाया गया जिसे Google जब चाहे हटा दे।
  इसे sideloading नहीं कहते। यह **"नाक में दम" करने वाली प्रक्रिया** है जिसे यह सुनिश्चित करने के लिए बनाया गया है
  कि लगभग कोई भी इसे पूरा न कर सके। और चूँकि यह Play Services द्वारा चलाया जा रहा है न कि OS द्वारा,
  गूगल इस प्रक्रिया को और सख्त या फिर चुपचाप हटा भी सकता है।
# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: '"...उन्हें दिक्कत देगा न जो कुछ छुपाना चाहते हैं?"'
# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android."
obj_hide_a: >-
  Whistleblowers, पत्रकार, और activists जो तानाशाही सरकार के अंतर्गत काम कर रहे हैं, वे इसके पहले शिकार बनेंगे।
  घरेलू उत्पीड़न से पीड़ित तबका इस कतार में अगले नंबर पर है।
  इन सभी समूहों के पास अपना सॉफ्टवेयर बनाने और इस्तेमाल करने के वैध कारण हैं,
  बिना अपनी कानूनी पहचान गूगल के डेटाबेस में डाले।
  गुमनाम open-source योगदान की परंपरा Google से भी पुरानी है। यह नीति उसे Android पर समाप्त करती है।
# [en] obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: '"...एप्पल भी तो करता है न?"'
# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status."
obj_apple_a: >-
  Apple पहले ही दिन से एक किले के समान है। लोगों ने Android इसीलिए चुना *क्यूंकि यह अलग था*।
  "एप्पल भी करता है", यह तो बस "एक अंधा, दूसरे की लाठी" वाली बात है और एक कमज़ोर *तू भी तो* तर्क है।
  और नियामक दबाव (EU के Digital Markets Act) के चलते, एप्पल को भी खुलने पर मजबूर किया जा रहा है।
  गूगल इसके उलट दिशा में जा रहा है: अपनी gatekeeper वाली पहचान को और मज़बूत करने की कोशिश में।
# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: '"...बस $25 और कुछ कागज़ात की ही तो बात है?"'
# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence of your signing keys to a company that [routinely complies](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) with government demands to remove apps and expose developers."
obj_cost_a: >-
  शायद, अगर आप भारत में एक डेवेलपर हैं जिसके पास क्रेडिट कार्ड और ड्राइविंग लाइसेंस है।
  मान लीजिये आप sub-Saharan Africa में एक छात्र हैं, या Myanmar में एक विद्रोही हैं,
  या फिर एक volunteer जो community health app चला रहा है।
  बात सिर्फ पैसों तक सीमित नहीं है: आप अपने सरकारी पहचान पत्र और signing keys एक ऐसी कंपनी को सौंप रहे हैं
  जो ऐप्स हटाने और डेवलपर्स को बेनकाब करने की सरकारी मांगों का
  [नियमित रूप से पालन करती है](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/)।
